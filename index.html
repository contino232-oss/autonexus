<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AutoNexus | Repuestos Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" id="main-logo" style="cursor: pointer;">AUTONEXUS</div>
        <div id="info-header" class="weather-box">Cargando datos...</div>
        <nav>
            <ul>
                <li><a href="#" id="btn-inicio">Inicio</a></li>
                <li><a href="#" class="cat-link" data-cat="motor">Motor</a></li>
                <li><a href="#" class="cat-link" data-cat="carroceria">Carrocería</a></li>
                
                <li>
                    <a href="#" class="cart-link" onclick="event.preventDefault(); showSection('carrito'); renderizarCarrito();">
                        <svg class="cart-icon" viewBox="0 0 24 24">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-counter">0</span>
                    </a>
                </li>
                
                <li><a href="#" id="nav-contacto">Contacto</a></li>
                <li><a href="#" id="nav-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section id="section-home">
            <div id="contenedor-piezas" class="product-grid"></div>
        </section>

        <section id="section-carrito" class="hidden auth-container">
            <h2>Tu Carrito</h2>
            <div id="lista-carrito"></div>
            <button onclick="showSection('home')">Seguir comprando</button>
        </section>

        <section id="section-contacto" class="hidden auth-container">
            <h2>Contacto</h2>
            <form id="form-contacto">
                <input type="text" placeholder="Nombre completo" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Tu mensaje" rows="5" style="width:100%"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>

        <section id="section-login" class="hidden auth-container">
            <h2>Acceso a Clientes</h2>
            <form id="form-login">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
